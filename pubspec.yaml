name: yummy
description: FitHerb - Modern wellness and health-focused application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.1
  url_launcher: ^6.2.1
  uuid: ^4.2.1
  intl: ^0.19.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_riverpod: ^2.4.9
  freezed_annotation: ^2.4.1
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  firebase_auth: ^5.4.1
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.1
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  drift_dev: ^2.14.1
  build_runner: ^2.4.7
  test: ^1.24.3
  mockito: ^5.4.2
  golden_toolkit: ^0.15.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#2E7D32"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/categories/
    - assets/restaurants/
    - assets/profile_pics/
    - assets/food/
